workflows:
  android-kotlin:
    name: Android Kotlin Build
    max_build_duration: 60
    environment:
      java: default  # استخدم Java الافتراضية على Codemagic
    scripts:
      - name: Build APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
