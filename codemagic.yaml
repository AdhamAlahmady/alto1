workflows:
  android-kotlin:
    name: Android Kotlin Build
    max_build_duration: 60
    environment:
      java: openjdk17
      vars:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    scripts:
      - name: Build APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
